# ------------------------------------------------------------------------
# Paste the location block below inside the existing
# `server { server_name crosslink.cipherscan.app; ... }` block in
# /etc/nginx/sites-enabled/crosslink.cipherscan.app (or wherever your
# nginx config lives).
#
# Also add the rate-limit zone at the top of /etc/nginx/nginx.conf inside
# the http { } block (only once, not per-site):
#
#     limit_req_zone $binary_remote_addr zone=bootstrap_dl:10m rate=6r/m;
#
# Then: `nginx -t && systemctl reload nginx`
# ------------------------------------------------------------------------

# Public Zebra Crosslink bootstrap snapshot (generated every 6h by
# /usr/local/bin/zebra-public-snapshot.sh).
location /bootstrap/ {
    alias /var/www/crosslink.cipherscan.app/bootstrap/;

    # Only the three expected filenames are accessible
    location = /bootstrap/bootstrap.tar.gz {
        # Rate-limit the big download to 6 req/min per IP, allow a small
        # burst for resumable clients (curl -C -).
        limit_req zone=bootstrap_dl burst=10 nodelay;
        # Let the file be resumable (important for >100MB downloads)
        add_header Accept-Ranges bytes;
        # Encourage caching at the user's ISP / CDN (valid until replaced)
        add_header Cache-Control "public, max-age=3600";
    }

    location = /bootstrap/bootstrap.tar.gz.sha256 {
        add_header Cache-Control "public, max-age=60";
        default_type text/plain;
    }

    location = /bootstrap/bootstrap.json {
        add_header Cache-Control "public, max-age=60";
        default_type application/json;
    }

    # Anything else under /bootstrap/ → 404
    location /bootstrap/ {
        return 404;
    }
}
